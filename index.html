</head>
<body>

<div id="audio-unlock-overlay">
    <div style="font-size: 1.2rem; color: #94a3b8; text-align:center; padding: 0 20px;">Browsers require permission before playing instruments.</div>
    <button class="unlock-btn" onclick="startAudioContext()">Click to Activate Audio</button>
</div>

<div class="container">
    <h1>Zayne's Ear Training</h1>
    <div class="header-line"></div>

    <div class="game-panel">
        <div class="selection-panel" id="pool-selector-zone">
            <div class="selection-title">Toggle Active Practice Notes</div>
            <div class="pool-controls">
                <button class="pool-btn" onclick="setPoolPreset('all')">Select All</button>
                <button class="pool-btn" onclick="setPoolPreset('naturals')">Naturals Only</button>
                <button class="pool-btn" onclick="setPoolPreset('sharps')">Sharps Only</button>
            </div>
            <div class="checkbox-grid" id="checkbox-container"></div>
        </div>

        <div class="mode-toggle-zone">
            <span class="mode-label active" id="lbl-sim">Simultaneous</span>
            <label class="switch">
                <input type="checkbox" id="mode-switch-checkbox" onchange="updateToggleLabels()">
                <span class="slider"></span>
            </label>
            <span class="mode-label" id="lbl-stagger">Bell First</span>
        </div>

        <div id="msg">Awaiting engine startup...</div>

        <div class="keyboard-wrapper">
            <div class="piano-grid">
                <div class="sharps-layer" id="piano-sharps"></div>
                <div class="naturals-layer" id="piano-naturals"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let audioCtx;
    let mp3Buffers = {}; 
    let wavBuffers = {}; 

    const progression = [
        { id: "G3",  solfege: "So 3", mp3File: "So 3.mp3", wavFile: "So 3.wav", type: "white", style: "G3" },
        { id: "Ab3", solfege: "Si 3", mp3File: "Si 3.mp3", wavFile: "Si 3.wav", type: "black", style: "Ab3" },
        { id: "A3",  solfege: "La 3", mp3File: "", wavFile: "La 3.wav", type: "white", style: "A3" },
        { id: "Bb3", solfege: "Te 3", mp3File: "", wavFile: "Te 3.wav", type: "black", style: "Bb3" },
        { id: "B3",  solfege: "Ti 3", mp3File: "", wavFile: "Ti 3.wav", type: "white", style: "B3" },
        { id: "C4",  solfege: "Do 4", mp3File: "Do 4.mp3", wavFile: "Do 4.wav", type: "white", style: "C4" },
        { id: "Db4", solfege: "Di 4", mp3File: "Di 4.mp3", wavFile: "Di 4.wav", type: "black", style: "Db4" },
        { id: "D4",  solfege: "Re 4", mp3File: "Re 4.mp3", wavFile: "Re 4.wav", type: "white", style: "D4" },
        { id: "Eb4", solfege: "Me 4", mp3File: "Me 4.mp3", wavFile: "Me 4.wav", type: "black", style: "Eb4" },
        { id: "E4",  solfege: "Mi 4", mp3File: "Mi 4.mp3", wavFile: "Mi 4.wav", type: "white", style: "E4" },
        { id: "F4",  solfege: "Fa 4", mp3File: "Fa 4.mp3", wavFile: "Fa 4.wav", type: "white", style: "F4" },
        { id: "Gb4", solfege: "Fi 4", mp3File: "Fi 4.mp3", wavFile: "Fi 4.wav", type: "black", style: "Gb4" },
        { id: "G4",  solfege: "So 4", mp3File: "So 4.mp3", wavFile: "So 4.wav", type: "white", style: "G4" },
        { id: "Ab4", solfege: "Si 4", mp3File: "Si 4.mp3", wavFile: "Si 4.wav", type: "black", style: "Ab4" },
        { id: "A4",  solfege: "La 4", mp3File: "La 3.mp3", wavFile: "La 4.wav", type: "white", style: "A4" },
        { id: "Bb4", solfege: "Te 4", mp3File: "Te 3.mp3", wavFile: "Te 4.wav", type: "black", style: "Bb4" },
        { id: "B4",  solfege: "Ti 4", mp3File: "Ti 3.mp3", wavFile: "Ti 4.wav", type: "white", style: "B4" },
        { id: "C5",  solfege: "Do 5", mp3File: "Do 5.mp3", wavFile: "Do 5.wav", type: "white", style: "C5" },
        { id: "Db5", solfege: "Di 5", mp3File: "Di 5.mp3", wavFile: "Di 5.wav", type: "black", style: "Db5" },
        { id: "D5",  solfege: "Re 5", mp3File: "Re 5.mp3", wavFile: "Re 5.wav", type: "white", style: "D5" },
        { id: "Eb5", solfege: "Me 5", mp3File: "Me 5.mp3", wavFile: "Me 5.wav", type: "black", style: "Eb5" },
        { id: "E5",  solfege: "Mi 5", mp3File: "Mi 5.mp3", wavFile: "Mi 5.wav", type: "white", style: "E5" },
        { id: "F5",  solfege: "Fa 5", mp3File: "Fa 5.mp3", wavFile: "Fa 5.wav", type: "white", style: "F5" },
        { id: "Gb5", solfege: "Fi 5", mp3File: "Fi 5.mp3", wavFile: "Fi 5.wav", type: "black", style: "Gb5" },
        { id: "G5",  solfege: "So 5", mp3File: "So 5.mp3", wavFile: "So 5.wav", type: "white", style: "G5" }
    ];

    // Assemble Interface Elements immediately
    progression.forEach((note) => {
        const btn = document.createElement('button');
        btn.className = `bell-btn ${note.style} p-key-${note.id}`;
        btn.id = `btn-${note.id}`;
        btn.setAttribute('onclick', `handleInput('${note.id}')`);
        btn.innerHTML = `<div class="color-badge">${note.solfege}</div>`;

        if (note.type === "black") document.getElementById('piano-sharps').appendChild(btn);
        else document.getElementById('piano-naturals').appendChild(btn);

        const label = document.createElement('label');
        label.className = 'check-item';
        label.innerHTML = `
            <input type="checkbox" value="${note.id}" checked id="chk-${note.id}" onchange="syncPoolUI()">
            <span>${note.solfege}</span>
        `;
        document.getElementById('checkbox-container').appendChild(label);
    });

    function updateToggleLabels() {
        const isChecked = document.getElementById('mode-switch-checkbox').checked;
        document.getElementById('lbl-sim').classList.toggle('active', !isChecked);
        document.getElementById('lbl-stagger').classList.toggle('active', isChecked);
    }

    // Triggered upon explicit button interaction
    function startAudioContext() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContextClass();
        
        // Remove overlay panel
        document.getElementById('audio-unlock-overlay').style.display = 'none';
        document.getElementById('msg').innerText = "Loading samples... please hold.";
        
        loadAllSounds();
    }

    async function fetchAudioBuffer(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP error ${response.status}`);
        const arrayBuffer = await response.arrayBuffer();
        return await audioCtx.decodeAudioData(arrayBuffer);
    }

    async function loadAllSounds() {
        for (let note of progression) {
            try {
                if(note.wavFile) wavBuffers[note.id] = await fetchAudioBuffer(note.wavFile);
            } catch (e) {
                console.error(`Missing vocal file: ${note.wavFile}`);
            }

            try {
                if(note.mp3File) mp3Buffers[note.id] = await fetchAudioBuffer(note.mp3File);
            } catch (e) {
                console.log(`Fallback mapping active for note: ${note.id}`);
            }
        }
        document.getElementById('msg').innerText = "Ready to play! Select notes or flip modes anytime.";
    }

    function syncPoolUI() {
        progression.forEach(note => {
            const chk = document.getElementById(`chk-${note.id}`);
            const b = document.getElementById(`btn-${note.id}`);
            b.classList.toggle('dimmed', !chk.checked);
        });
    }

    function setPoolPreset(type) {
        progression.forEach(note => {
            const chk = document.getElementById(`chk-${note.id}`);
            if (type === 'all') chk.checked = true;
            if (type === 'naturals') chk.checked = (note.type === 'white');
            if (type === 'sharps') chk.checked = (note.type === 'black');
        });
        syncPoolUI();
    }

    function handleInput(choice) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const now = audioCtx.currentTime;
        const isStaggeredMode = document.getElementById('mode-switch-checkbox').checked;

        let bellBufferToPlay = mp3Buffers[choice];
        let playbackRateValue = 1.0;

        // Fallbacks
        if (!bellBufferToPlay) {
            const basePrefix = choice.replace(/[0-9]/g, ''); 
            if (choice.includes('5')) {
                const fallbackId = `${basePrefix}4`;
                if (mp3Buffers[fallbackId]) {
                    bellBufferToPlay = mp3Buffers[fallbackId];
                    playbackRateValue = 2.0; 
                }
            } else if (choice.includes('3')) {
                const fallbackId = `${basePrefix}4`;
                if (mp3Buffers[fallbackId]) {
                    bellBufferToPlay = mp3Buffers[fallbackId];
                    playbackRateValue = 0.5; 
                }
            }
        }

        // Play Bell Sound at Full Strength (Volume 1.0)
        if (bellBufferToPlay) {
            const mp3Source = audioCtx.createBufferSource();
            mp3Source.buffer = bellBufferToPlay;
            mp3Source.playbackRate.value = playbackRateValue;
            
            // Safe, Direct Channel Connection
            mp3Source.connect(audioCtx.destination);
            mp3Source.start(now);
        }

        // Play Vocal Sound with internal volume balancing node
        if (wavBuffers[choice]) {
            const wavSource = audioCtx.createBufferSource();
            wavSource.buffer = wavBuffers[choice];
            
            // Build localized inline node layout to keep it soft
            const localGain = audioCtx.createGain();
            localGain.gain.value = 0.35; // Quiet vocal mix
            
            wavSource.connect(localGain);
            localGain.connect(audioCtx.destination);

            if (!isStaggeredMode) {
                wavSource.start(now); // Together
            } else {
                wavSource.start(now + 0.35); // Staggered delay loop
            }
        }
    }
</script>
</body>
</html>
