<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHROMACHORDS - Chromatic Solfege Keyboard</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --progress-bg: #334155;
            --progress-fill: #2ecc71;
            --timer-color: #ef4444;
            --keyboard-bg: #0b0f19;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 1050px; display: flex; flex-direction: column; align-items: center; }

        h1 { color: #38bdf8; font-size: 2.2rem; text-align: center; margin: 10px 0 5px 0; width: 100%; letter-spacing: 2px; }

        .header-line { width: 80%; height: 2px; background: #38bdf8; margin-bottom: 20px; opacity: 0.5; }

        .stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 15px; }
        .stat-group { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 2.5rem; font-weight: 800; line-height: 1; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-sub); letter-spacing: 1px; }

        .game-panel {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .mode-tag {
            background: #334155;
            color: #cbd5e1;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .mode-tag.game-on { background: #f59e0b; color: #1e293b; }
        .mode-tag.test-round { background: #6366f1; color: #ffffff; }

        /* --- SELECTION POOL CHECKBOX AREA --- */
        .selection-panel {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            width: 100%;
            border: 1px solid #334155;
        }
        .selection-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #38bdf8;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .pool-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 12px;
        }
        .pool-btn {
            background: #334155;
            color: #ffffff;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .pool-btn:hover { background: #475569; }
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
            gap: 8px;
            max-height: 120px;
            overflow-y: auto;
            padding: 5px;
        }
        .check-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            user-select: none;
        }
        .check-item input { cursor: pointer; }

        .progress-container { width: 100%; max-width: 500px; height: 12px; background-color: var(--progress-bg); border-radius: 10px; margin-bottom: 5px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background-color: var(--progress-fill); transition: width 0.3s; }

        #timer-text { font-size: 1.2rem; font-weight: 800; color: var(--timer-color); margin-bottom: 5px; height: 1.5rem; }

        #play-btn, #replay-btn, #begin-round-btn {
            background: #2ecc71; color: white; border: none; padding: 12px 30px; border-radius: 40px;
            font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        #replay-btn { background: #38bdf8; display: none; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); color: #0f172a; }
        #begin-round-btn { background: #f97316; display: none; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3); }

        #msg { font-weight: 600; color: #94a3b8; min-height: 1.5rem; text-align: center; margin-bottom: 15px; font-size: 1.1rem; }

        /* --- PIANO KEYBOARD GRID LAYOUT --- */
        .keyboard-wrapper {
            background-color: var(--keyboard-bg);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            overflow-x: auto;
            display: flex;
            justify-content: center;
        }

        .piano-grid {
            position: relative;
            display: grid;
            grid-template-columns: repeat(12, 68px); /* 12 white-key blocks wide */
            gap: 6px;
            width: max-content;
        }

        .sharps-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 110px;
            z-index: 2;
            pointer-events: none;
            display: grid;
            grid-template-columns: repeat(12, 68px);
            gap: 6px;
        }

        .naturals-layer {
            display: contents;
        }

        /* Swatch Key Box Styles */
        .bell-btn {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 2px;
            position: relative;
            transition: transform 0.1s, filter 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            pointer-events: auto;
            background-color: #1e293b;
            color: #ffffff;
            font-weight: 800;
            font-size: 0.95rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        }
        
        .bell-btn:active { transform: scale(0.95); }
        .bell-btn.dimmed { filter: grayscale(80%) brightness(35%); opacity: 0.5; }

        /* Key Layer Layout Parameters */
        .naturals-layer .bell-btn {
            height: 160px;
            margin-top: 105px;
        }

        .sharps-layer .bell-btn {
            height: 100px;
            grid-column-end: span 2;
            width: 52px;
        }
        
        #btn-Bb3  { grid-column: 1; margin-left: 42px; }
        #btn-Db4  { grid-column: 3; margin-left: 42px; }
        #btn-Eb4  { grid-column: 4; margin-left: 42px; }
        #btn-Gb4  { grid-column: 6; margin-left: 42px; }
        #btn-Ab4  { grid-column: 7; margin-left: 42px; }
        #btn-Bb4  { grid-column: 8; margin-left: 42px; }
        #btn-Db5  { grid-column: 10; margin-left: 42px; }
        #btn-Eb5  { grid-column: 11; margin-left: 42px; }

        /* --- PRODIGIES BOX COLOR SYSTEM --- */
        .bell-btn.A3  { background-color: #5b448a; } 
        .bell-btn.Bb3 { background-color: #704d8c; }
        .bell-btn.B3  { background-color: #d1528b; } 
        .bell-btn.C4  { background-color: #dc2626; } 
        .bell-btn.Db4 { background-color: #cd5a43; }
        .bell-btn.D4  { background-color: #ea580c; } 
        .bell-btn.Eb4 { background-color: #e3be54; }
        .bell-btn.E4  { background-color: #eab308; } 
        .bell-btn.F4  { background-color: #65a30d; } 
        .bell-btn.Gb4 { background-color: #559c74; }
        .bell-btn.G4  { background-color: #0d9488; } 
        .bell-btn.Ab4 { background-color: #3b7bb8; }
        .bell-btn.A4  { background-color: #7c3aed; } 
        .bell-btn.Bb4 { background-color: #825e9c; }
        .bell-btn.B4  { background-color: #ec4899; } 
        .bell-btn.C5  { background-color: #be123c; } 
        .bell-btn.Db5 { background-color: #c2410c; }
        .bell-btn.D5  { background-color: #f97316; } 
        .bell-btn.Eb5 { background-color: #ca8a04; }
        .bell-btn.E5  { background-color: #84cc16; }
    </style>
</head>
<body>
<div class="container">
    <h1>CHROMACHORDS</h1>
    <div class="header-line"></div>
    
    <div class="stats">
        <div class="stat-group"><span id="streak" class="stat-val">0</span><span class="stat-label">Streak</span></div>
        <div class="stat-group"><span id="strikes" class="stat-val" style="color:#ef4444">0</span><span class="stat-label">Strikes</span></div>
    </div>

    <div class="game-panel">
        <div id="mode-label" class="mode-tag">Explore Mode</div>
        
        <div class="selection-panel" id="pool-selector-zone">
            <div class="selection-title">Choose Game Sound Selection Pool</div>
            <div class="pool-controls">
                <button class="pool-btn" onclick="setPoolPreset('all')">Select All</button>
                <button class="pool-btn" onclick="setPoolPreset('naturals')">Naturals Only</button>
                <button class="pool-btn" onclick="setPoolPreset('sharps')">Sharps Only</button>
            </div>
            <div class="checkbox-grid" id="checkbox-container"></div>
        </div>

        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <div id="timer-text"></div>
        
        <button id="play-btn" onclick="prepareRound()">Start Game</button>
        <button id="begin-round-btn" onclick="startActualGame()">Begin Round</button>
        <button id="replay-btn" onclick="replaySound()">Replay Sound</button>
        <div id="msg">Explore all sounds before playing!</div>

        <div class="keyboard-wrapper">
            <div class="piano-grid">
                <div class="sharps-layer" id="sharps-container"></div>
                <div class="naturals-layer" id="naturals-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // System Definition Array
    const progression = [
        { id: "A3",  solfege: "La 3", file: "La 3.wav", type: "white", style: "A3" },
        { id: "Bb3", solfege: "Te 3", file: "Te 3.wav", type: "black", style: "Bb3" },
        { id: "B3",  solfege: "Ti 3", file: "Ti 3.wav", type: "white", style: "B3" },
        { id: "C4",  solfege: "Do 4", file: "Do 4.wav", type: "white", style: "C4" },
        { id: "Db4", solfege: "Di 4", file: "Di 4.wav", type: "black", style: "Db4" },
        { id: "D4",  solfege: "Re 4", file: "Re 4.wav", type: "white", style: "D4" },
        { id: "Eb4", solfege: "Me 4", file: "Me 4.wav", type: "black", style: "Eb4" },
        { id: "E4",  solfege: "Mi 4", file: "Mi 4.wav", type: "white", style: "E4" },
        { id: "F4",  solfege: "Fa 4", file: "Fa 4.wav", type: "white", style: "F4" },
        { id: "Gb4", solfege: "Fi 4", file: "Fi 4.wav", type: "black", style: "Gb4" },
        { id: "G4",  solfege: "So 4", file: "So 4.wav", type: "white", style: "G4" },
        { id: "Ab4", solfege: "Si 4", file: "Si 4.wav", type: "black", style: "Ab4" },
        { id: "A4",  solfege: "La 4", file: "La 4.wav", type: "white", style: "A4" },
        { id: "Bb4", solfege: "Te 4", file: "Te 4.wav", type: "black", style: "Bb4" },
        { id: "B4",  solfege: "Ti 4", file: "Ti 4.wav", type: "white", style: "B4" },
        { id: "C5",  solfege: "Do 5", file: "Do 5.wav", type: "white", style: "C5" },
        { id: "Db5", solfege: "Di 5", file: "Di 5.wav", type: "black", style: "Db5" },
        { id: "D5",  solfege: "Re 5", file: "Re 5.wav", type: "white", style: "D5" },
        { id: "Eb5", solfege: "Me 5", file: "Me 5.wav", type: "black", style: "Eb5" },
        { id: "E5",  solfege: "Mi 5", file: "Mi 5.wav", type: "white", style: "E5" }
    ];
    
    let streak = 0;
    let strikes = 0;
    let currentTarget = null;
    let isGameActive = false;
    let isTestRound = false; 
    let timeLeft = 10;
    let timerInterval = null;
    let activeGamePool = [];

    const sharpsRow = document.getElementById('sharps-container');
    const naturalsRow = document.getElementById('naturals-container');
    const checkboxGrid = document.getElementById('checkbox-container');

    // Build the visual swatches and layout configuration
    progression.forEach((note) => {
        // Create key block
        const btn = document.createElement('button');
        btn.className = `bell-btn ${note.style}`;
        btn.id = `btn-${note.id}`;
        btn.setAttribute('onclick', `handleInput('${note.id}')`);
        btn.innerHTML = `<div>${note.solfege}</div>`;

        if (note.type === "black") {
            sharpsRow.appendChild(btn);
        } else {
            naturalsRow.appendChild(btn);
        }

        // Create configuration selector checkboxes
        const label = document.createElement('label');
        label.className = 'check-item';
        label.innerHTML = `
            <input type="checkbox" value="${note.id}" checked id="chk-${note.id}" onchange="syncPoolUI()">
            <span>${note.solfege}</span>
        `;
        checkboxGrid.appendChild(label);
    });

    function syncPoolUI() {
        progression.forEach(note => {
            const chk = document.getElementById(`chk-${note.id}`);
            const btn = document.getElementById(`btn-${note.id}`);
            if (chk.checked) {
                btn.classList.remove('dimmed');
            } else {
                btn.classList.add('dimmed');
            }
        });
    }

    function setPoolPreset(type) {
        progression.forEach(note => {
            const chk = document.getElementById(`chk-${note.id}`);
            if (type === 'all') chk.checked = true;
            if (type === 'naturals') chk.checked = (note.type === 'white');
            if (type === 'sharps') chk.checked = (note.type === 'black');
        });
        syncPoolUI();
    }

    function getSelectedPool() {
        let selected = [];
        progression.forEach(note => {
            if (document.getElementById(`chk-${note.id}`).checked) {
                selected.push(note.id);
            }
        });
        return selected;
    }

    // Audio Player Engine Execution
    function playSound(noteId) {
        const noteConfig = progression.find(n => n.id === noteId);
        if (!noteConfig) return;
        
        // Native browser instantiation utilizing your file structure
        const snd = new Audio(noteConfig.file);
        snd.play().catch(e => console.log("Audio asset loader context exception:", e));
    }

    function replaySound() { if (currentTarget) { playSound(currentTarget); startTimer(); } }

    function startTimer() {
        if (isTestRound) return; 
        clearInterval(timerInterval);
        timeLeft = 10;
        document.getElementById('timer-text').innerText = `Time: ${timeLeft}s`;
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-text').innerText = `Time: ${timeLeft}s`;
            if (timeLeft <= 0) handleTimeout();
        }, 1000);
    }

    function stopTimer() { clearInterval(timerInterval); document.getElementById('timer-text').innerText = ""; }

    function handleTimeout() { stopTimer(); document.getElementById('msg').innerText = "Too slow! ⏰"; processWrong(); }

    function prepareRound() {
        activeGamePool = getSelectedPool();
        if (activeGamePool.length === 0) {
            alert("Please select at least one solfege sound to build your target pool!");
            return;
        }

        isGameActive = true;
        isTestRound = true;
        streak = 0;
        
        document.getElementById('play-btn').style.display = "none";
        document.getElementById('replay-btn').style.display = "none"; 
        document.getElementById('begin-round-btn').style.display = "block";
        document.getElementById('pool-selector-zone').style.with = "100%";
        
        document.getElementById('mode-label').innerText = "Practice Round: Try your active sounds!";
        document.getElementById('mode-label').className = "mode-tag test-round";
        
        updateUI();
        document.getElementById('msg').innerText = `Practice pressing your selection pool options before starting!`;
    }

    function startActualGame() {
        isTestRound = false;
        document.getElementById('begin-round-btn').style.display = "none";
        document.getElementById('replay-btn').style.display = "block";
        document.getElementById('mode-label').innerText = "Game Mode";
        document.getElementById('mode-label').className = "mode-tag game-on";
        
        nextQuestion();
    }

    function nextQuestion() {
        const choice = activeGamePool[Math.floor(Math.random() * activeGamePool.length)];
        currentTarget = choice;
        playSound(currentTarget);
        document.getElementById('msg').innerText = "Which solfege swatch sound was that?";
        startTimer();
    }

    function handleInput(choice) {
        // Disallow dim/deselected choices during active gameplay loops
        if (isGameActive && !activeGamePool.includes(choice)) return;

        playSound(choice);

        if (!isGameActive || isTestRound) {
            if(isTestRound) {
                const noteObj = progression.find(n => n.id === choice);
                document.getElementById('msg').innerText = "Practice: " + noteObj.solfege;
            }
            return;
        }

        if (choice === currentTarget) {
            stopTimer();
            streak++;
            document.getElementById('msg').innerText = "Correct! ✨";
            
            if (streak >= 10) {
                document.getElementById('msg').innerText = "ROUND COMPLETED! Fantastic listening skills!";
                isGameActive = false;
                setTimeout(() => location.reload(), 2500);
            } else {
                updateUI();
                setTimeout(nextQuestion, 800);
            }
        } else {
            stopTimer();
            processWrong();
        }
    }

    function processWrong() {
        strikes++; streak = 0; updateUI();
        if (strikes >= 3) { 
            document.getElementById('msg').innerText = "GAME OVER";
            setTimeout(() => location.reload(), 2000); 
        }
        else { setTimeout(nextQuestion, 1500); }
    }

    function updateUI() {
        document.getElementById('streak').innerText = streak;
        document.getElementById('strikes').innerText = strikes;
        document.getElementById('progress-bar').style.width = (streak * 10) + "%";
    }
</script>
</body>
</html>
