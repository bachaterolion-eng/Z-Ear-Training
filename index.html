<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHROMACHORDS - Prodigies Keyboard</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --progress-bg: #334155;
            --progress-fill: #2ecc71;
            --timer-color: #ef4444;
            --keyboard-bg: #0b0f19;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; align-items: center; }

        h1 { color: #38bdf8; font-size: 2.2rem; text-align: center; margin: 10px 0 5px 0; width: 100%; letter-spacing: 2px; }

        .header-line { width: 80%; height: 2px; background: #38bdf8; margin-bottom: 20px; opacity: 0.5; }

        .stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 15px; }
        .stat-group { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 2.5rem; font-weight: 800; line-height: 1; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: var(--text-sub); letter-spacing: 1px; }

        .game-panel {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .mode-tag {
            background: #334155;
            color: #cbd5e1;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .mode-tag.game-on { background: #f59e0b; color: #1e293b; }
        .mode-tag.test-round { background: #6366f1; color: #ffffff; }

        .level-select-container { margin-bottom: 15px; color: #cbd5e1; font-weight: 700; font-size: 0.9rem; }
        #level-select { 
            padding: 5px 10px; 
            border-radius: 10px; 
            border: 2px solid #334155; 
            background: #0f172a;
            font-weight: 700;
            color: #38bdf8;
            cursor: pointer;
        }

        .progress-container { width: 100%; max-width: 500px; height: 12px; background-color: var(--progress-bg); border-radius: 10px; margin-bottom: 5px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background-color: var(--progress-fill); transition: width 0.3s; }

        #timer-text { font-size: 1.2rem; font-weight: 800; color: var(--timer-color); margin-bottom: 5px; height: 1.5rem; }

        #play-btn, #replay-btn, #begin-round-btn {
            background: #2ecc71; color: white; border: none; padding: 12px 30px; border-radius: 40px;
            font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        #replay-btn { background: #38bdf8; display: none; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); color: #0f172a; }
        #begin-round-btn { background: #f97316; display: none; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3); }

        #msg { font-weight: 600; color: #94a3b8; min-height: 1.5rem; text-align: center; margin-bottom: 15px; font-size: 1.1rem; }

        /* --- PIANO KEYBOARD GRID LAYOUT --- */
        .keyboard-wrapper {
            background-color: var(--keyboard-bg);
            padding: 20px;
            border-radius: 20px;
            width: 100%;
            overflow-x: auto; /* Scrollable if screen is too small */
            display: flex;
            justify-content: center;
        }

        .piano-grid {
            position: relative;
            display: grid;
            grid-template-columns: repeat(12, 65px); /* 12 White keys total from A3 to E5 */
            gap: 5px;
            width: max-content;
        }

        /* Row designations */
        .sharps-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 110px;
            z-index: 2;
            pointer-events: none; /* Let clicks pass through empty spaces */
            display: grid;
            grid-template-columns: repeat(12, 65px);
            gap: 5px;
        }

        .naturals-layer {
            display: contents; /* Behaves as direct grid children */
        }

        /* Bell Buttons Base */
        .bell-btn {
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px 2px;
            position: relative;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            pointer-events: auto; /* Re-enable clicks inside layers */
            background-color: #1e293b;
            opacity: 0.25; /* Dimmed when locked/inactive */
        }
        
        .bell-btn.active { opacity: 1; }
        .bell-btn:active { transform: scale(0.95); }

        /* Naturals Row Sizing */
        .naturals-layer .bell-btn {
            height: 160px;
            margin-top: 105px; /* Leave room above for sharp layout overlap */
        }

        /* Sharps Row Sizing and precise layout offsets over white key gaps */
        .sharps-layer .bell-btn {
            height: 100px;
            grid-column-end: span 2;
            width: 50px;
        }
        
        /* Absolute offsets alignments to position black keys directly over dividers */
        #btn-Bb3  { grid-column: 1; margin-left: 40px; }
        #btn-Db4  { grid-column: 3; margin-left: 40px; }
        #btn-Eb4  { grid-column: 4; margin-left: 40px; }
        #btn-Fb4  { display: none; } /* No structural sharp between E and F */
        #btn-Gb4  { grid-column: 6; margin-left: 40px; }
        #btn-Ab4  { grid-column: 7; margin-left: 40px; }
        #btn-Bb4  { grid-column: 8; margin-left: 40px; }
        #btn-Db5  { grid-column: 10; margin-left: 40px; }
        #btn-Eb5  { grid-column: 11; margin-left: 40px; }

        /* Decorative Bell Typography and Cap Graphics */
        .bell-cap {
            background: #000000;
            color: #ffffff;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 5px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
            min-width: 28px;
        }
        .naturals-layer .bell-cap {
            background: #ffffff;
            color: #000000;
            font-size: 0.75rem;
            border: 1px solid rgba(0,0,0,0.3);
        }

        .bell-emoji { font-size: 1.8rem; line-height: 1; }
        .sharps-layer .bell-emoji { font-size: 1.4rem; }

        /* --- PRODIGIES IDENTICAL COLOR PALETTE --- */
        /* Naturals */
        .bell-btn.active.A3 { background-color: #5b448a; } /* Deep Purple */
        .bell-btn.active.B3 { background-color: #d1528b; } /* Pink-Magenta */
        .bell-btn.active.C4 { background-color: #dc2626; } /* Primary Red */
        .bell-btn.active.D4 { background-color: #ea580c; } /* Vivid Orange */
        .bell-btn.active.E4 { background-color: #eab308; } /* Bright Yellow */
        .bell-btn.active.F4 { background-color: #65a30d; } /* Yellow-Green */
        .bell-btn.active.G4 { background-color: #0d9488; } /* Teal-Blue */
        .bell-btn.active.A4 { background-color: #7c3aed; } /* True Purple */
        .bell-btn.active.B4 { background-color: #ec4899; } /* Light Pink */
        .bell-btn.active.C5 { background-color: #be123c; } /* Crimson/Darker Red */
        .bell-btn.active.D5 { background-color: #f97316; } /* Light Orange/Apricot */
        .bell-btn.active.E5 { background-color: #84cc16; } /* Lime Green */

        /* Sharps / Flats (Muted/Deep tones matching background cards) */
        .bell-btn.active.Bb3 { background-color: #704d8c; }
        .bell-btn.active.Db4 { background-color: #cd5a43; }
        .bell-btn.active.Eb4 { background-color: #e3be54; }
        .bell-btn.active.Gb4 { background-color: #559c74; }
        .bell-btn.active.Ab4 { background-color: #3b7bb8; }
        .bell-btn.active.Bb4 { background-color: #825e9c; }
        .bell-btn.active.Db5 { background-color: #c2410c; }
        .bell-btn.active.Eb5 { background-color: #ca8a04; }

    </style>
</head>
<body>
<div class="container">
    <h1>CHROMACHORDS</h1>
    <div class="header-line"></div>
    
    <div class="stats">
        <div class="stat-group"><span id="streak" class="stat-val">0</span><span class="stat-label">Streak</span></div>
        <div class="stat-group"><span id="strikes" class="stat-val" style="color:#ef4444">0</span><span class="stat-label">Strikes</span></div>
    </div>

    <div class="game-panel">
        <div id="mode-label" class="mode-tag">Test Mode</div>
        
        <div class="level-select-container" id="selector-box">
            Start at Level: 
            <select id="level-select" onchange="changeStartingLevel()">
                </select>
        </div>

        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <div id="timer-text"></div>
        
        <button id="play-btn" onclick="prepareRound()">Start Game</button>
        <button id="begin-round-btn" onclick="startActualGame()">Begin Round</button>
        <button id="replay-btn" onclick="replaySound()">Replay Sound</button>
        <div id="msg">Explore all sounds before playing!</div>

        <div class="keyboard-wrapper">
            <div class="piano-grid">
                <div class="sharps-layer" id="sharps-container"></div>
                <div class="naturals-layer" id="naturals-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Audio Context Setup
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Complete note dictionary linking frequencies (MIDI math equivalents)
    const progression = [
        { id: "A3",  label: "A",     freq: 220.00, type: "white", style: "A3" },
        { id: "Bb3", label: "A#/Bb", freq: 233.08, type: "black", style: "Bb3" },
        { id: "B3",  label: "B",     freq: 246.94, type: "white", style: "B3" },
        { id: "C4",  label: "C",     freq: 261.63, type: "white", style: "C4" },
        { id: "Db4", label: "C#/Db", freq: 277.18, type: "black", style: "Db4" },
        { id: "D4",  label: "D",     freq: 293.66, type: "white", style: "D4" },
        { id: "Eb4", label: "D#/Eb", freq: 311.13, type: "black", style: "Eb4" },
        { id: "E4",  label: "E",     freq: 329.63, type: "white", style: "E4" },
        { id: "F4",  label: "F",     freq: 349.23, type: "white", style: "F4" },
        { id: "Gb4", label: "F#/Gb", freq: 369.99, type: "black", style: "Gb4" },
        { id: "G4",  label: "G",     freq: 392.00, type: "white", style: "G4" },
        { id: "Ab4", label: "G#/Ab", freq: 415.30, type: "black", style: "Ab4" },
        { id: "A4",  label: "A",     freq: 440.00, type: "white", style: "A4" },
        { id: "Bb4", label: "A#/Bb", freq: 466.16, type: "black", style: "Bb4" },
        { id: "B4",  label: "B",     freq: 493.88, type: "white", style: "B4" },
        { id: "C5",  label: "C",     freq: 523.25, type: "white", style: "C5" },
        { id: "Db5", label: "C#/Db", freq: 554.37, type: "black", style: "Db5" },
        { id: "D5",  label: "d",     freq: 587.33, type: "white", style: "D5" },
        { id: "Eb5", label: "d#/e*", freq: 622.25, type: "black", style: "Eb5" },
        { id: "E5",  label: "e",     freq: 659.25, type: "white", style: "E5" }
    ];
    
    let gameLevel = 1; 
    let streak = 0;
    let strikes = 0;
    let currentTarget = null;
    let isGameActive = false;
    let isTestRound = false; 
    let timeLeft = 10;
    let timerInterval = null;

    // Dynamically render the keyboard arrangement matching image layout
    const sharpsRow = document.getElementById('sharps-container');
    const naturalsRow = document.getElementById('naturals-container');

    progression.forEach((note) => {
        const btn = document.createElement('button');
        btn.className = `bell-btn ${note.style}`;
        btn.id = `btn-${note.id}`;
        btn.setAttribute('onclick', `handleInput('${note.id}')`);
        btn.innerHTML = `
            <div class="bell-cap">${note.label}</div>
            <div class="bell-emoji">🔔</div>
            <div></div>
        `;

        if (note.type === "black") {
            sharpsRow.appendChild(btn);
        } else {
            naturalsRow.appendChild(btn);
        }
    });

    // Setup level selection box elements
    const selector = document.getElementById('level-select');
    progression.forEach((note, i) => {
        let opt = document.createElement('option');
        opt.value = i + 1;
        opt.innerHTML = `Level ${i + 1} (${note.id})`;
        selector.appendChild(opt);
    });

    function changeStartingLevel() {
        if (!isGameActive) {
            gameLevel = parseInt(selector.value);
            updateUI();
        }
    }

    // Mathematical Programmatic Synthesizer Function (Replaces missing WAV files gracefully)
    function playSound(noteId) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const noteConfig = progression.find(n => n.id === noteId);
        if (!noteConfig) return;

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        // Bell timbre optimization (Sine foundation with a high harmonic chime ring)
        osc.type = 'sine';
        osc.frequency.setValueAtTime(noteConfig.freq, audioCtx.currentTime);
        
        // Quick transient percussion strike envelope shape
        gainNode.gain.setValueAtTime(0.6, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 1.2);
    }

    function replaySound() { if (currentTarget) { playSound(currentTarget); startTimer(); } }

    function startTimer() {
        if (isTestRound) return; 
        clearInterval(timerInterval);
        timeLeft = 10;
        document.getElementById('timer-text').innerText = `Time: ${timeLeft}s`;
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-text').innerText = `Time: ${timeLeft}s`;
            if (timeLeft <= 0) handleTimeout();
        }, 1000);
    }

    function stopTimer() { clearInterval(timerInterval); document.getElementById('timer-text').innerText = ""; }

    function handleTimeout() { stopTimer(); document.getElementById('msg').innerText = "Too slow! ⏰"; processWrong(); }

    function prepareRound() {
        isGameActive = true;
        isTestRound = true;
        streak = 0;
        
        document.getElementById('play-btn').style.display = "none";
        document.getElementById('replay-btn').style.display = "none"; 
        document.getElementById('begin-round-btn').style.display = "block";
        document.getElementById('selector-box').style.display = "none";
        
        document.getElementById('mode-label').innerText = "Practice Round: Try the layout!";
        document.getElementById('mode-label').className = "mode-tag test-round";
        
        updateUI();
        
        const newNote = progression[gameLevel - 1];
        document.getElementById('msg').innerText = `Level ${gameLevel}: Play target note ${newNote.id} to practice!`;
    }

    function startActualGame() {
        isTestRound = false;
        document.getElementById('begin-round-btn').style.display = "none";
        document.getElementById('replay-btn').style.display = "block";
        document.getElementById('mode-label').innerText = "Game Mode";
        document.getElementById('mode-label').className = "mode-tag game-on";
        
        nextQuestion();
    }

    function nextQuestion() {
        const available = progression.slice(0, gameLevel);
        const choiceObj = available[Math.floor(Math.random() * available.length)];
        currentTarget = choiceObj.id;
        playSound(currentTarget);
        document.getElementById('msg').innerText = "Which bell note was that?";
        startTimer();
    }

    function handleInput(choice) {
        const btn = document.getElementById(`btn-${choice}`);
        if (!btn.classList.contains('active')) return;

        playSound(choice);

        if (!isGameActive || isTestRound) {
            if(isTestRound) {
                document.getElementById('msg').innerText = "Practice: " + choice;
            }
            return;
        }

        if (choice === currentTarget) {
            stopTimer();
            streak++;
            document.getElementById('msg').innerText = "Correct! ✨";
            
            if (streak >= 20) {
                if (gameLevel < progression.length) {
                    gameLevel++;
                    document.getElementById('msg').innerText = "LEVEL UP! Expanding keyboard scale...";
                    setTimeout(prepareRound, 1500);
                } else {
                    document.getElementById('msg').innerText = "MASTERED! You completed all bell levels!";
                    isGameActive = false;
                    setTimeout(() => location.reload(), 3000);
                }
            } else {
                updateUI();
                setTimeout(nextQuestion, 800);
            }
        } else {
            stopTimer();
            processWrong();
        }
    }

    function processWrong() {
        strikes++; streak = 0; updateUI();
        if (strikes >= 3) { 
            document.getElementById('msg').innerText = "GAME OVER";
            setTimeout(() => location.reload(), 2000); 
        }
        else { setTimeout(nextQuestion, 1500); }
    }

    function updateUI() {
        document.getElementById('streak').innerText = streak;
        document.getElementById('strikes').innerText = strikes;
        document.getElementById('progress-bar').style.width = (streak * 5) + "%";
        
        progression.forEach((note, i) => {
            const btn = document.getElementById(`btn-${note.id}`);
            if (!isGameActive || i < gameLevel) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    updateUI();
</script>
</body>
</html>
