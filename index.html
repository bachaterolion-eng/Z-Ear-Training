<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayne's Ear Training</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --keyboard-bg: #0b0f19;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; }

        h1 { color: #38bdf8; font-size: 2.5rem; font-weight: 800; text-align: center; margin: 10px 0 5px 0; width: 100%; letter-spacing: 1px; }

        .header-line { width: 80%; height: 2px; background: #38bdf8; margin-bottom: 25px; opacity: 0.5; }

        .game-panel {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .selection-panel {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            width: 100%;
            border: 1px solid #334155;
        }
        .selection-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #38bdf8;
            margin-bottom: 10px;
            text-align: center;
        }
        .pool-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 12px;
        }
        .pool-btn {
            background: #334155;
            color: #ffffff;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .pool-btn:hover { background: #475569; }
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
            padding: 5px;
        }
        .check-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        #msg { font-weight: 600; color: #38bdf8; min-height: 1.5rem; text-align: center; margin-bottom: 20px; font-size: 1.1rem; }

        .keyboard-wrapper {
            background-color: var(--keyboard-bg);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 650px; 
            overflow-x: auto;
            overflow-y: hidden;
            display: block;
            -webkit-overflow-scrolling: touch; 
            border: 2px solid #334155;
        }

        @media screen and (orientation: landscape) {
            .keyboard-wrapper {
                max-width: 100%; 
                display: flex;
                justify-content: center;
            }
        }

        .keyboard-wrapper::-webkit-scrollbar { height: 10px; }
        .keyboard-wrapper::-webkit-scrollbar-track { background: #0b0f19; border-radius: 10px; }
        .keyboard-wrapper::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
        .keyboard-wrapper::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }

        .piano-grid {
            position: relative;
            display: grid;
            grid-template-columns: repeat(15, 70px); 
            gap: 10px;
            width: max-content;
            padding-bottom: 5px;
        }

        .sharps-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            z-index: 2;
            pointer-events: none;
            display: grid;
            grid-template-columns: repeat(15, 70px);
            gap: 10px;
        }

        .naturals-layer { display: contents; }

        .bell-btn {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px; 
            position: relative;
            transition: transform 0.05s, filter 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            pointer-events: auto;
            color: #ffffff;
            font-weight: 800;
            font-size: 0.85rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            text-align: center;
            padding: 2px;
        }
        
        .bell-btn:active { transform: scale(0.92); }
        .bell-btn.dimmed { filter: grayscale(80%) brightness(30%); opacity: 0.4; pointer-events: none; }

        .naturals-layer .bell-btn { margin-top: 85px; }
        
        #btn-Ab3  { grid-column: 1; margin-left: 40px; }
        #btn-Bb3  { grid-column: 2; margin-left: 40px; }
        #btn-Db4  { grid-column: 4; margin-left: 40px; }
        #btn-Eb4  { grid-column: 5; margin-left: 40px; }
        #btn-Gb4  { grid-column: 7; margin-left: 40px; }
        #btn-Ab4  { grid-column: 8; margin-left: 40px; }
        #btn-Bb4  { grid-column: 9; margin-left: 40px; }
        #btn-Db5  { grid-column: 11; margin-left: 40px; }
        #btn-Eb5  { grid-column: 12; margin-left: 40px; }
        #btn-Gb5  { grid-column: 14; margin-left: 40px; }

        .bell-btn.G3,  .bell-btn.G4,  .bell-btn.G5   { background-color: #4d908e; } 
        .bell-btn.Ab3, .bell-btn.Ab4, .bell-btn.Ab5  { background-color: #277da1; } 
        .bell-btn.A3,  .bell-btn.A4                  { background-color: #6a4c93; } 
        .bell-btn.Bb3, .bell-btn.Bb4                 { background-color: #8367a6; } 
        .bell-btn.B3,  .bell-btn.B4                  { background-color: #f35b8c; } 
        .bell-btn.C4,  .bell-btn.C5                  { background-color: #d62828; } 
        .bell-btn.Db4, .bell-btn.Db5                 { background-color: #e65c40; } 
        .bell-btn.D4,  .bell-btn.D5                  { background-color: #f3722c; } 
        .bell-btn.Eb4, .bell-btn.Eb5                 { background-color: #f9c74f; } 
        .bell-btn.E4,  .bell-btn.E5                  { background-color: #f9cd13; } 
        .bell-btn.F4,  .bell-btn.F5                  { background-color: #90be6d; } 
        .bell-btn.Gb4, .bell-btn.Gb5                 { background-color: #43aa8b; } 
    </style>
</head>
<body>
<div class="container">
    <h1>Zayne's Ear Training</h1>
    <div class="header-line"></div>

    <div class="game-panel">
        <div class="selection-panel" id="pool-selector-zone">
            <div class="selection-title">Toggle Active Practice Notes</div>
            <div class="pool-controls">
                <button class="pool-btn" onclick="setPoolPreset('all')">Select All</button>
                <button class="pool-btn" onclick="setPoolPreset('naturals')">Naturals Only</button>
                <button class="pool-btn" onclick="setPoolPreset('sharps')">Sharps Only</button>
            </div>
            <div class="checkbox-grid" id="checkbox-container"></div>
        </div>

        <div id="msg">Preloading vocal clips...</div>

        <div class="keyboard-wrapper">
            <div class="piano-grid">
                <div class="sharps-layer" id="sharps-container"></div>
                <div class="naturals-layer" id="naturals-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    
    // Exact frequencies matching standard tempered layout for your 25 keys
    const progression = [
        { id: "G3",  solfege: "So 3", hz: 196.00, wavFile: "So 3.wav", type: "white", style: "G3" },
        { id: "Ab3", solfege: "Si 3", hz: 207.65, wavFile: "Si 3.wav", type: "black", style: "Ab3" },
        { id: "A3",  solfege: "La 3", hz: 220.00, wavFile: "La 3.wav", type: "white", style: "A3" },
        { id: "Bb3", solfege: "Te 3", hz: 233.08, wavFile: "Te 3.wav", type: "black", style: "Bb3" },
        { id: "B3",  solfege: "Ti 3", hz: 246.94, wavFile: "Ti 3.wav", type: "white", style: "B3" },
        
        { id: "C4",  solfege: "Do 4", hz: 261.63, wavFile: "Do 4.wav", type: "white", style: "C4" },
        { id: "Db4", solfege: "Di 4", hz: 277.18, wavFile: "Di 4.wav", type: "black", style: "Db4" },
        { id: "D4",  solfege: "Re 4", hz: 293.66, wavFile: "Re 4.wav", type: "white", style: "D4" },
        { id: "Eb4", solfege: "Me 4", hz: 311.13, wavFile: "Me 4.wav", type: "black", style: "Eb4" },
        { id: "E4",  solfege: "Mi 4", hz: 329.63, wavFile: "E 4.wav",  type: "white", style: "E4" }, 
        { id: "F4",  solfege: "Fa 4", hz: 349.23, wavFile: "Fa 4.wav", type: "white", style: "F4" },
        { id: "Gb4", solfege: "Fi 4", hz: 369.99, wavFile: "Fi 4.wav", type: "black", style: "Gb4" },
        { id: "G4",  solfege: "So 4", hz: 392.00, wavFile: "So 4.wav", type: "white", style: "G4" },
        { id: "Ab4", solfege: "Si 4", hz: 415.30, wavFile: "Si 4.wav", type: "black", style: "Ab4" },
        { id: "A4",  solfege: "La 4", hz: 440.00, wavFile: "La 4.wav", type: "white", style: "A4" },
        { id: "Bb4", solfege: "Te 4", hz: 466.16, wavFile: "Te 4.wav", type: "black", style: "Bb4" },
        { id: "B4",  solfege: "Ti 4", hz: 493.88, wavFile: "Ti 4.wav", type: "white", style: "B4" },
        
        { id: "C5",  solfege: "Do 5", hz: 523.25, wavFile: "Do 5.wav", type: "white", style: "C5" },
        { id: "Db5", solfege: "Di 5", hz: 554.37, wavFile: "Di 5.wav", type: "black", style: "Db5" },
        { id: "D5",  solfege: "Re 5", hz: 587.33, wavFile: "D5.wav",   type: "white", style: "D5" },
        { id: "Eb5", solfege: "Me 5", hz: 622.25, wavFile: "Eb5.wav",  type: "black", style: "Eb5" },
        { id: "E5",  solfege: "Mi 5", hz: 659.25, wavFile: "E5.wav",   type: "white", style: "E5" },
        { id: "F5",  solfege: "Fa 5", hz: 698.46, wavFile: "F5.wav",   type: "white", style: "F5" },
        { id: "Gb5", solfege: "Fi 5", hz: 739.99, wavFile: "F#5.wav",  type: "black", style: "Gb5" },
        { id: "G5",  solfege: "So 5", hz: 783.99, wavFile: "G5.wav",   type: "white", style: "G5" }
    ];
    
    let wavBuffers = {}; 

    const sharpsRow = document.getElementById('sharps-container');
    const naturalsRow = document.getElementById('naturals-container');
    const checkboxGrid = document.getElementById('checkbox-container');

    progression.forEach((note) => {
        const btn = document.createElement('button');
        btn.className = `bell-btn ${note.style}`;
        btn.id = `btn-${note.id}`;
        btn.setAttribute('onclick', `handleInput('${note.id}')`);
        btn.innerHTML = `<div>${note.solfege}</div>`;

        if (note.type === "black") {
            sharpsRow.appendChild(btn);
        } else {
            naturalsRow.appendChild(btn);
        }

        const label = document.createElement('label');
        label.className = 'check-item';
        label.innerHTML = `
            <input type="checkbox" value="${note.id}" checked id="chk-${note.id}" onchange="syncPoolUI()">
            <span>${note.solfege}</span>
        `;
        checkboxGrid.appendChild(label);
    });

    async function fetchAudioBuffer(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const arrayBuffer = await response.arrayBuffer();
        return await audioCtx.decodeAudioData(arrayBuffer);
    }

    async function loadAllSounds() {
        let loadedWavsCount = 0;

        for (let note of progression) {
            try {
                wavBuffers[note.id] = await fetchAudioBuffer(note.wavFile);
                loadedWavsCount++;
            } catch (e) {
                console.error(`Could not locate voice file: ${note.wavFile}`);
            }
            document.getElementById('msg').innerText = `Loading Assets... (Voices: ${loadedWavsCount}/25)`;
        }

        document.getElementById('msg').innerText = "Ready! Bell synth active across all 25 notes.";
    }
    loadAllSounds();

    // Synthesis engine that directly generates perfect Prodigies Deskbells audio signals
    function playSyntheticBell(frequency, startTime) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        // Use a triangle waveform to mimic the warm, round strike of a desk bell
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(frequency, startTime);
        
        // Precise attack-decay chime configuration
        gainNode.gain.setValueAtTime(0.0, startTime);
        gainNode.gain.linearRampToValueAtTime(0.6, startTime + 0.01); // Sharp metallic impact
        gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 1.2); // Long clear ring trail
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start(startTime);
        osc.stop(startTime + 1.2);
    }

    function syncPoolUI() {
        progression.forEach(note => {
            const chk = document.getElementById(`chk-${note.id}`);
            const btn = document.getElementById(`btn-${note.id}`);
            btn.classList.toggle('dimmed', !chk.checked);
        });
    }

    function setPoolPreset(type) {
        progression.forEach(note => {
            const chk = document.getElementById(`chk-${note.id}`);
            if (type === 'all') chk.checked = true;
            if (type === 'naturals') chk.checked = (note.type === 'white');
            if (type === 'sharps') chk.checked = (note.type === 'black');
        });
        syncPoolUI();
    }

    function handleInput(choice) {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const now = audioCtx.currentTime;
        const overlapTiming = 0.22; // Snappy instant gap override

        const noteConfig = progression.find(n => n.id === choice);
        if (!noteConfig) return;

        // 1. Synthesize bell strike live at target note frequency
        playSyntheticBell(noteConfig.hz, now);

        // 2. Play corresponding localized human audio script clip seamlessly downstream
        if (wavBuffers[choice]) {
            const wavSource = audioCtx.createBufferSource();
            wavSource.buffer = wavBuffers[choice];
            wavSource.connect(audioCtx.destination);
            wavSource.start(now + overlapTiming);
        }
    }
</script>
</body>
</html>
