<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayne's Ear Training</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --keyboard-bg: #0b0f19;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; }

        h1 { color: #38bdf8; font-size: 2.5rem; font-weight: 800; text-align: center; margin: 10px 0 5px 0; width: 100%; letter-spacing: 1px; }

        .header-line { width: 80%; height: 2px; background: #38bdf8; margin-bottom: 25px; opacity: 0.5; }

        .game-panel {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .selection-panel {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            width: 100%;
            border: 1px solid #334155;
        }
        .selection-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #38bdf8;
            margin-bottom: 10px;
            text-align: center;
        }
        .pool-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 12px;
        }
        .pool-btn {
            background: #334155;
            color: #ffffff;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .pool-btn:hover { background: #475569; }
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
            padding: 5px;
        }
        .check-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        #msg { font-weight: 600; color: #94a3b8; min-height: 1.5rem; text-align: center; margin-bottom: 20px; font-size: 1.1rem; }

        .keyboard-wrapper {
            background-color: var(--keyboard-bg);
            padding: 30px 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 1100px; 
            overflow-x: auto;
            overflow-y: hidden;
            display: block;
            -webkit-overflow-scrolling: touch; 
            border: 4px solid #1e293b;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        @media screen and (orientation: landscape) {
            .keyboard-wrapper {
                max-width: 100%; 
                display: flex;
                justify-content: center;
            }
        }

        .keyboard-wrapper::-webkit-scrollbar { height: 10px; }
        .keyboard-wrapper::-webkit-scrollbar-track { background: #0b0f19; border-radius: 10px; }
        .keyboard-wrapper::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
        .keyboard-wrapper::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }

        .piano-grid {
            position: relative;
            display: block;
            width: max-content;
            height: 240px;
            background: #000;
            padding: 4px;
            border-radius: 4px;
        }

        .sharps-layer {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 100%;
            height: 145px;
            z-index: 2;
            pointer-events: none;
            display: grid;
            grid-template-columns: repeat(15, 60px);
            gap: 5px;
        }

        .naturals-layer { 
            display: grid;
            grid-template-columns: repeat(15, 60px);
            gap: 5px;
            height: 100%;
        }

        .bell-btn {
            border: 1px solid rgba(0, 0, 0, 0.3);
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            position: relative;
            transition: filter 0.2s, transform 0.05s, box-shadow 0.05s;
            pointer-events: auto;
            color: #ffffff;
            font-weight: 800;
            font-size: 0.8rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
            text-align: center;
            padding-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        /* Piano Styling for White Keys */
        .naturals-layer .bell-btn {
            height: 232px;
            border-radius: 0 0 7px 7px;
            border-bottom: 4px solid rgba(0,0,0,0.4);
        }

        /* Piano Styling for Black Keys */
        .sharps-layer .bell-btn {
            height: 145px;
            width: 38px;
            border-radius: 0 0 4px 4px;
            z-index: 3;
            font-size: 0.75rem;
            padding-bottom: 10px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.6);
            border-bottom: 5px solid rgba(0,0,0,0.5);
        }

        .naturals-layer .bell-btn:active { 
            transform: translateY(2px);
            border-bottom-width: 1px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        .sharps-layer .bell-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.6);
        }

        .bell-btn.dimmed { filter: grayscale(80%) brightness(20%); opacity: 0.2; pointer-events: none; }
        
        /* Piano layout spacing configurations for accidental positions */
        #btn-Ab3  { grid-column: 1; margin-left: 38px; }
        #btn-Bb3  { grid-column: 2; margin-left: 38px; }
        #btn-Db4  { grid-column: 4; margin-left: 38px; }
        #btn-Eb4  { grid-column: 5; margin-left: 38px; }
        #btn-Gb4  { grid-column: 7; margin-left: 38px; }
        #btn-Ab4  { grid-column: 8; margin-left: 38px; }
        #btn-Bb4  { grid-column: 9; margin-left: 38px; }
        #btn-Db5  { grid-column: 11; margin-left: 38px; }
        #btn-Eb5  { grid-column: 12; margin-left: 38px; }
        #btn-Gb5  { grid-column: 14; margin-left: 38px; }

        /* Original Color Identity preserved perfectly */
        .bell-btn.G3,  .bell-btn.G4,  .bell-btn.G5   { background: linear-gradient(to bottom, #3a6d6b, #4d908e); } 
        .bell-btn.Ab3, .bell-btn.Ab4, .bell-btn.Ab5  { background: linear-gradient(to bottom, #1d5f7a, #277da1); } 
        .bell-btn.A3,  .bell-btn.A4                  { background: linear-gradient(to bottom, #513970, #6a4c93); } 
        .bell-btn.Bb3, .bell-btn.Bb4                 { background: linear-gradient(to bottom, #654e80, #8367a6); } 
        .bell-btn.B3,  .bell-btn.B4                  { background: linear-gradient(to bottom, #c4436e, #f35b8c); } 
        .bell-btn.C4,  .bell-btn.C5                  { background: linear-gradient(to bottom, #ab1f1f, #d62828); } 
        .bell-btn.Db4, .bell-btn.Db5                 { background: linear-gradient(to bottom, #bd4931, #e65c40); } 
        .bell-btn.D4,  .bell-btn.D5                  { background: linear-gradient(to bottom, #c75b20, #f3722c); } 
        .bell-btn.Eb4, .bell-btn.Eb5                 { background: linear-gradient(to bottom, #cca23c, #f9c74f); } 
        .bell-btn.E4,  .bell-btn.E5                  { background: linear-gradient(to bottom, #cca60f, #f9cd13); } 
        .bell-btn.F4,  .bell-btn.F5                  { background: linear-gradient(to bottom, #729955, #90be6d); } 
        .bell-btn.Gb4, .bell-btn.Gb5                 { background: linear-gradient(to bottom, #32826a, #43aa8b); } 
    </style>
</head>
<body>
<div class="container">
    <h1>Zayne's Ear Training</h1>
    <div class="header-line"></div>

    <div class="game-panel">
        <div class="selection-panel" id="pool-selector-zone">
            <div class="selection-title">Toggle Active Practice Notes</div>
            <div class="pool-controls">
                <button class="pool-btn" onclick="setPoolPreset('all')">Select All</button>
                <button class="pool-btn" onclick="setPoolPreset('naturals')">Naturals Only</button>
                <button class="pool-btn" onclick="setPoolPreset('sharps')">Sharps Only</button>
            </div>
            <div class="checkbox-grid" id="checkbox-container"></div>
        </div>

        <div id="msg">Loading audio components... Please wait.</div>

        <div class="keyboard-wrapper">
            <div class="piano-grid">
                <div class="sharps-layer" id="sharps-container"></div>
                <div class="naturals-layer" id="naturals-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    
    const progression = [
        { id: "G3",  solfege: "So 3", mp3File: "So 3.mp3", wavFile: "So 3.wav", type: "white", style: "G3" },
        { id: "Ab3", solfege: "Si 3", mp3File: "Si 3.mp3", wavFile: "Si 3.wav", type: "black", style: "Ab3" },
        { id: "A3",  solfege: "La 3", mp3File: "", wavFile: "La 3.wav", type: "white", style: "A3" },
        { id: "Bb3", solfege: "Te 3", mp3File: "", wavFile: "Te 3.wav", type: "black", style: "Bb3" },
        { id: "B3",  solfege: "Ti 3", mp3File: "", wavFile: "Ti 3.wav", type: "white", style: "B3" },
        { id: "C4",  solfege: "Do 4", mp3File: "Do 4.mp3", wavFile: "Do 4.wav", type: "white", style: "C4" },
        { id: "Db4", solfege: "Di 4", mp3File: "Di 4.mp3", wavFile: "Di 4.wav", type: "black", style: "Db4" },
        { id: "D4",  solfege: "Re 4", mp3File: "Re 4.mp3", wavFile: "Re 4.wav", type: "white", style: "D4" },
        { id: "Eb4", solfege: "Me 4", mp3File: "Me 4.mp3", wavFile: "Me 4.wav", type: "black", style: "Eb4" },
        { id: "E4",  solfege: "Mi 4", mp3File: "Mi 4.mp3", wavFile: "Mi 4.wav", type: "white", style: "E4" },
        { id: "F4",  solfege: "Fa 4", mp3File: "Fa 4.mp3", wavFile: "Fa 4.wav", type: "white", style: "F4" },
        { id: "Gb4", solfege: "Fi 4", mp3File: "Fi 4.mp3", wavFile: "Fi 4.wav", type: "black", style: "Gb4" },
        { id: "G4",  solfege: "So 4", mp3File: "So 4.mp3", wavFile: "So 4.wav", type: "white", style: "G4" },
        { id: "Ab4", solfege: "Si 4", mp3File: "Si 4.mp3", wavFile: "Si 4.wav", type: "black", style: "Ab4" },
        { id: "A4",  solfege: "La 4", mp3File: "La 3.mp3", wavFile: "La 4.wav", type: "white", style: "A4" },
        { id: "Bb4", solfege: "Te 4", mp3File: "Te 3.mp3", wavFile: "Te 4.wav", type: "black", style: "Bb4" },
        { id: "B4",  solfege: "Ti 4", mp3File: "Ti 3.mp3", wavFile: "Ti 4.wav", type: "white", style: "B4" },
        { id: "C5",  solfege: "Do 5", mp3File: "Do 5.mp3", wavFile: "Do 5.wav", type: "white", style: "C5" },
        { id: "Db5", solfege: "Di 5", mp3File: "Di 5.mp3", wavFile: "Di 5.wav", type: "black", style: "Db5" },
        { id: "D5",  solfege: "Re 5", mp3File: "Re 5.mp3", wavFile: "Re 5.wav", type: "white", style: "D5" },
        { id: "Eb5", solfege: "Me 5", mp3File: "Me 5.mp3", wavFile: "Me 5.wav", type: "black", style: "Eb5" },
        { id: "E5",  solfege: "Mi 5", mp3File: "Mi 5.mp3", wavFile: "Mi 5.wav", type: "white", style: "E5" },
        { id: "F5",  solfege: "Fa 5", mp3File: "Fa 5.mp3", wavFile: "Fa 5.wav", type: "white", style: "F5" },
        { id: "Gb5", solfege: "Fi 5", mp3File: "Fi 5.mp3", wavFile: "Fi 5.wav", type: "black", style: "Gb5" },
        { id: "G5",  solfege: "So 5", mp3File: "So 5.mp3", wavFile: "So 5.wav", type: "white", style: "G5" }
    ];
    
    let mp3Buffers = {}; 
    let wavBuffers = {}; 

    const sharpsRow = document.getElementById('sharps-container');
    const naturalsRow = document.getElementById('naturals-container');
    const checkboxGrid = document.getElementById('checkbox-container');

    progression.forEach((note) => {
        const btn = document.createElement('button');
        btn.className = `bell-btn ${note.style}`;
        btn.id = `btn-${note.id}`;
        btn.setAttribute('onclick', `handleInput('${note.id}')`);
        btn.innerHTML = `<div>${note.solfege}</div>`;

        if (note.type === "black") {
            sharpsRow.appendChild(btn);
        } else {
            naturalsRow.appendChild(btn);
        }

        const label = document.createElement('label');
        label.className = 'check-item';
        label.innerHTML = `
            <input type="checkbox" value="${note.id}" checked id="chk-${note.id}" onchange="syncPoolUI()">
            <span>${note.solfege}</span>
        `;
        checkboxGrid.appendChild(label);
    });

    async function fetchAudioBuffer(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP error ${response.status}`);
        const arrayBuffer = await response.arrayBuffer();
        return await audioCtx.decodeAudioData(arrayBuffer);
    }

    async function loadAllSounds() {
        for (let note of progression) {
            // Load WAV files (Crucial voice files)
            try {
                if(note.wavFile) wavBuffers[note.id] = await fetchAudioBuffer(note.wavFile);
            } catch (e) {
                console.error(`Missing vocal file: ${note.wavFile}`, e);
            }

            // Load MP3 files (Bell sounds)
            try {
                if(note.mp3File) mp3Buffers[note.id] = await fetchAudioBuffer(note.mp3File);
            } catch (e) {
                console.log(`Using smart fallback routing for note: ${note.id}`);
            }
        }
        document.getElementById('msg').innerText = "Ready! Every single key is linked to a bell and voice now.";
    }
    loadAllSounds();

    function syncPoolUI() {
        progression.forEach(note => {
            const chk = document.getElementById(`chk-${note.id}`);
            const btn = document.getElementById(`btn-${note.id}`);
            btn.classList.toggle('dimmed', !chk.checked);
        });
    }

    function setPoolPreset(type) {
        progression.forEach(note => {
            const chk = document.getElementById(`chk-${note.id}`);
            if (type === 'all') chk.checked = true;
            if (type === 'naturals') chk.checked = (note.type === 'white');
            if (type === 'sharps') chk.checked = (note.type === 'black');
        });
        syncPoolUI();
    }

    function handleInput(choice) {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const now = audioCtx.currentTime;
        const overlapTiming = 0.25; 

        let bellBufferToPlay = mp3Buffers[choice];
        let playbackRateValue = 1.0;

        // --- AUTOMATIC PITCH-SHIFT ROUTING FALLBACKS ---
        if (!bellBufferToPlay) {
            const basePrefix = choice.replace(/[0-9]/g, ''); 
            
            if (choice.includes('5')) {
                const fallbackId = `${basePrefix}4`;
                if (mp3Buffers[fallbackId]) {
                    bellBufferToPlay = mp3Buffers[fallbackId];
                    playbackRateValue = 2.0; 
                }
            } else if (choice.includes('3')) {
                const fallbackId = `${basePrefix}4`;
                if (mp3Buffers[fallbackId]) {
                    bellBufferToPlay = mp3Buffers[fallbackId];
                    playbackRateValue = 0.5; 
                }
            }
        }

        // Play the matched or pitch-corrected Bell Sound
        if (bellBufferToPlay) {
            const mp3Source = audioCtx.createBufferSource();
            mp3Source.buffer = bellBufferToPlay;
            mp3Source.playbackRate.value = playbackRateValue;
            mp3Source.connect(audioCtx.destination);
            mp3Source.start(now);
        }

        // Play the exact matching vocal WAV file right after the bell
        if (wavBuffers[choice]) {
            const wavSource = audioCtx.createBufferSource();
            wavSource.buffer = wavBuffers[choice];
            wavSource.connect(audioCtx.destination);
            wavSource.start(now + overlapTiming);
        }
    }
</script>
</body>
</html>
