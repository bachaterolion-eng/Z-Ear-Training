<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayne's Ear Training</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --keyboard-bg: #0b0f19;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 1050px; display: flex; flex-direction: column; align-items: center; }

        h1 { color: #38bdf8; font-size: 2.5rem; font-weight: 800; text-align: center; margin: 10px 0 5px 0; width: 100%; letter-spacing: 1px; }

        .header-line { width: 80%; height: 2px; background: #38bdf8; margin-bottom: 25px; opacity: 0.5; }

        .game-panel {
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .selection-panel {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            width: 100%;
            border: 1px solid #334155;
        }
        .selection-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #38bdf8;
            margin-bottom: 10px;
            text-align: center;
        }
        .pool-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 12px;
        }
        .pool-btn {
            background: #334155;
            color: #ffffff;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .pool-btn:hover { background: #475569; }
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
            gap: 8px;
            max-height: 120px;
            overflow-y: auto;
            padding: 5px;
        }
        .check-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        #msg { font-weight: 600; color: #94a3b8; min-height: 1.5rem; text-align: center; margin-bottom: 20px; font-size: 1.1rem; }

        /* --- STABLE SQUARE GEOMETRY BOARD GRID --- */
        .keyboard-wrapper {
            background-color: var(--keyboard-bg);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            overflow-x: auto;
            display: flex;
            justify-content: center;
        }

        .piano-grid {
            position: relative;
            display: grid;
            grid-template-columns: repeat(12, 70px); 
            gap: 10px;
            width: max-content;
        }

        .sharps-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            z-index: 2;
            pointer-events: none;
            display: grid;
            grid-template-columns: repeat(12, 70px);
            gap: 10px;
        }

        .naturals-layer {
            display: contents;
        }

        /* Square Blocks Styling */
        .bell-btn {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px; 
            position: relative;
            transition: transform 0.05s, filter 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            pointer-events: auto;
            color: #ffffff;
            font-weight: 800;
            font-size: 0.85rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            text-align: center;
            padding: 2px;
        }
        
        .bell-btn:active { transform: scale(0.92); }
        .bell-btn.dimmed { filter: grayscale(80%) brightness(30%); opacity: 0.4; pointer-events: none; }

        /* Spacing for base layer */
        .naturals-layer .bell-btn {
            margin-top: 85px; 
        }
        
        /* Layout alignments mapped from Screenshot 2026-05-29 at 12.38.18 PM.png */
        #btn-Bb3  { grid-column: 1; margin-left: 40px; }
        #btn-Db4  { grid-column: 3; margin-left: 40px; }
        #btn-Eb4  { grid-column: 4; margin-left: 40px; }
        #btn-Gb4  { grid-column: 6; margin-left: 40px; }
        #btn-Ab4  { grid-column: 7; margin-left: 40px; }
        #btn-Bb4  { grid-column: 8; margin-left: 40px; }
        #btn-Db5  { grid-column: 10; margin-left: 40px; }
        #btn-Eb5  { grid-column: 11; margin-left: 40px; }

        /* --- IDENTICAL INTER-OCTAVE PRODIGIES HEX COLORS --- */
        .bell-btn.C4, .bell-btn.C5   { background-color: #d62828; } 
        .bell-btn.Db4, .bell-btn.Db5 { background-color: #e65c40; } 
        .bell-btn.D4, .bell-btn.D5   { background-color: #f3722c; } 
        .bell-btn.Eb4, .bell-btn.Eb5 { background-color: #f9c74f; } 
        .bell-btn.E4, .bell-btn.E5   { background-color: #f9cd13; } 
        .bell-btn.F4                 { background-color: #90be6d; } 
        .bell-btn.Gb4                { background-color: #43aa8b; } 
        .bell-btn.G4                 { background-color: #4d908e; } 
        .bell-btn.Ab4                { background-color: #277da1; } 
        .bell-btn.A3, .bell-btn.A4   { background-color: #6a4c93; } 
        .bell-btn.Bb3, .bell-btn.Bb4 { background-color: #8367a6; } 
        .bell-btn.B3, .bell-btn.B4   { background-color: #f35b8c; } 
    </style>
</head>
<body>
<div class="container">
    <h1>Zayne's Ear Training</h1>
    <div class="header-line"></div>

    <div class="game-panel">
        
        <!-- VISIBLE CONFIGURATION PANEL FOR INTERACTIVE TESTING CHOICE -->
        <div class="selection-panel" id="pool-selector-zone">
            <div class="selection-title">Toggle Active Practice Notes</div>
            <div class="pool-controls">
                <button class="pool-btn" onclick="setPoolPreset('all')">Select All</button>
                <button class="pool-btn" onclick="setPoolPreset('naturals')">Naturals Only</button>
                <button class="pool-btn" onclick="setPoolPreset('sharps')">Sharps Only</button>
            </div>
            <div class="checkbox-grid" id="checkbox-container"></div>
        </div>

        <div id="msg">Loading audio components... Please wait.</div>

        <div class="keyboard-wrapper">
            <div class="piano-grid">
                <div class="sharps-layer" id="sharps-container"></div>
                <div class="naturals-layer" id="naturals-container"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    
    const progression = [
        { id: "A3",  solfege: "La 3", file: "La 3.wav", type: "white", style: "A3" },
        { id: "Bb3", solfege: "Te 3", file: "Te 3.wav", type: "black", style: "Bb3" },
        { id: "B3",  solfege: "Ti 3", file: "Ti 3.wav", type: "white", style: "B3" },
        { id: "C4",  solfege: "Do 4", file: "Do 4.wav", type: "white", style: "C4" },
        { id: "Db4", solfege: "Di 4", file: "Di 4.wav", type: "black", style: "Db4" },
        { id: "D4",  solfege: "Re 4", file: "Re 4.wav", type: "white", style: "D4" },
        { id: "Eb4", solfege: "Me 4", file: "Me 4.wav", type: "black", style: "Eb4" },
        { id: "E4",  solfege: "Mi 4", file: "Mi 4.wav", type: "white", style: "E4" },
        { id: "F4",  solfege: "Fa 4", file: "Fa 4.wav", type: "white", style: "F4" },
        { id: "Gb4", solfege: "Fi 4", file: "Fi 4.wav", type: "black", style: "Gb4" },
        { id: "G4",  solfege: "So 4", file: "So 4.wav", type: "white", style: "G4" },
        { id: "Ab4", solfege: "Si 4", file: "Si 4.wav", type: "black", style: "Ab4" },
        { id: "A4",  solfege: "La 4", file: "La 4.wav", type: "white", style: "A4" },
        { id: "Bb4", solfege: "Te 4", file: "Te 4.wav", type: "black", style: "Bb4" },
        { id: "B4",  solfege: "Ti 4", file: "Ti 4.wav", type: "white", style: "B4" },
        { id: "C5",  solfege: "Do 5", file: "Do 5.wav", type: "white", style: "C5" },
        { id: "Db5", solfege: "Di 5", file: "Di 5.wav", type: "black", style: "Db5" },
        { id: "D5",  solfege: "Re 5", file: "Re 5.wav", type: "white", style: "D5" },
        { id: "Eb5", solfege: "Me 5", file: "Me 5.wav", type: "black", style: "Eb5" },
        { id: "E5",  solfege: "Mi 5", file: "Mi 5.wav", type: "white", style: "E5" }
    ];
    
    let audioBuffers = {}; 

    const sharpsRow = document.getElementById('sharps-container');
    const naturalsRow = document.getElementById('naturals-container');
    const checkboxGrid = document.getElementById('checkbox-container');

    // Build the square structures and toggle control selectors
    progression.forEach((note) => {
        const btn = document.createElement('button');
        btn.className = `bell-btn ${note.style}`;
        btn.id = `btn-${note.id}`;
        btn.setAttribute('onclick', `handleInput('${note.id}')`);
        btn.innerHTML = `<div>${note.solfege}</div>`;

        if (note.type === "black") {
            sharpsRow.appendChild(btn);
        } else {
            naturalsRow.appendChild(btn);
        }

        const label = document.createElement('label');
        label.className = 'check-item';
        label.innerHTML = `
            <input type="checkbox" value="${note.id}" checked id="chk-${note.id}" onchange="syncPoolUI()">
            <span>${note.solfege}</span>
        `;
        checkboxGrid.appendChild(label);
    });

    // RAM cache audio loading pipeline for instant execution
    async function loadAllSounds() {
        for (let note of progression) {
            try {
                const response = await fetch(note.file);
                const arrayBuffer = await response.arrayBuffer();
                audioBuffers[note.id] = await audioCtx.decodeAudioData(arrayBuffer);
            } catch (error) {
                console.error(`Asset path loader anomaly: ${note.file}`, error);
            }
        }
        document.getElementById('msg').innerText = "Tap any active square to play the sound instantly!";
    }
    loadAllSounds();

    function syncPoolUI() {
        progression.forEach(note => {
            const chk = document.getElementById(`chk-${note.id}`);
            const btn = document.getElementById(`btn-${note.id}`);
            if (chk.checked) {
                btn.classList.remove('dimmed');
            } else {
                btn.classList.add('dimmed');
            }
        });
    }

    function setPoolPreset(type) {
        progression.forEach(note => {
            const chk = document.getElementById(`chk-${note.id}`);
            if (type === 'all') chk.checked = true;
            if (type === 'naturals') chk.checked = (note.type === 'white');
            if (type === 'sharps') chk.checked = (note.type === 'black');
        });
        syncPoolUI();
    }

    function handleInput(choice) {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        
        if (!audioBuffers[choice]) return; 

        // Instant fire context pipeline
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffers[choice];
        source.connect(audioCtx.destination);
        source.start(0);
    }
</script>
</body>
</html>
